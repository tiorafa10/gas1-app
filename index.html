<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Apontamento GAS1</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="lib/leaflet.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- Splash -->
  <div id="splash">
    <h1>Apontamento GAS1</h1>
    <p>Carregando mapa e dados...</p>
  </div>

  <!-- Mapa -->
  <div id="map"></div>

  <!-- Filtros por Parque -->
  <div id="filter-bar"></div>

  <!-- Estatisticas -->
  <div id="stats-bar">
    <div class="stat-item">
      <span class="stat-dot green"></span>
      <span><span id="stats-completed">0</span> ok</span>
    </div>
    <div class="stat-item">
      <span class="stat-dot orange"></span>
      <span><span id="stats-partial">0</span> parc.</span>
    </div>
    <div class="stat-item">
      <span class="stat-dot gray"></span>
      <span>Total: <span id="stats-total">0</span></span>
    </div>
  </div>

  <!-- Botao GPS -->
  <button id="btn-gps" title="Minha localizacao">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
    </svg>
  </button>

  <!-- Botao Exportar -->
  <button id="btn-export" title="Exportar CSV">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </button>

  <!-- Overlay -->
  <div id="panel-overlay"></div>

  <!-- Painel do Poste -->
  <div id="pole-panel">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <h2 id="pole-title">-</h2>
      <button id="btn-close-panel">&times;</button>
    </div>

    <div class="pole-info">
      <div class="pole-info-item">
        <span class="pole-info-label">Parque</span>
        <span class="pole-info-value" id="pole-parque">-</span>
      </div>
      <div class="pole-info-item">
        <span class="pole-info-label">Barramento</span>
        <span class="pole-info-value" id="pole-barramento">-</span>
      </div>
      <div class="pole-info-item">
        <span class="pole-info-label">Topologia</span>
        <span class="pole-info-value" id="pole-topologia">-</span>
      </div>
      <div class="pole-info-item">
        <span class="pole-info-label">Ancoragem</span>
        <span class="pole-info-value" id="pole-ancoragem">-</span>
      </div>
      <div class="pole-info-item">
        <span class="pole-info-label">Posicao</span>
        <span class="pole-info-value" id="pole-posicao">-</span>
      </div>
      <div class="pole-info-item">
        <span class="pole-info-label">Altura</span>
        <span class="pole-info-value" id="pole-altura">-</span>
      </div>
      <div class="pole-info-item">
        <span class="pole-info-label">Esforco</span>
        <span class="pole-info-value" id="pole-esforco">-</span>
      </div>
    </div>

    <div class="activities-header">Atividades 8.12</div>
    <div id="activities-list"></div>
    <button id="btn-save-panel" style="display:none">Salvar Apontamento</button>
  </div>

  <!-- Scripts -->
  <script src="lib/leaflet.js"></script>
  <script src="js/poles.js"></script>
  <script src="js/db.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
